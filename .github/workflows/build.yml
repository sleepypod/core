name: Build & Package

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate install script branch default
        if: github.event_name == 'pull_request'
        run: |
          expected="${{ github.base_ref }}"
          actual=$(grep -oP 'SCRIPT_DEFAULT_BRANCH="\K[^"]+' scripts/install)
          if [ "$actual" != "$expected" ]; then
            echo "::error::scripts/install has SCRIPT_DEFAULT_BRANCH=\"$actual\" but PR targets \"$expected\". Update it before merging."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Create deploy tarball
        run: |
          # Package source + .next build (no node_modules — installed on target)
          tar czf /tmp/sleepypod-core.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env*' \
            --exclude='*.db' \
            --exclude='*.db-*' \
            --exclude='test-results' \
            --exclude='.serena' \
            --exclude='.claude' \
            .
          mv /tmp/sleepypod-core.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sleepypod-core
          path: sleepypod-core.tar.gz
          retention-days: 30

