name: Contract Test

on:
  pull_request:
    paths:
      - 'src/server/routers/**'
      - 'src/db/*schema*'
      - 'contract-tests/**'

permissions:
  contents: read

jobs:
  contract-test:
    runs-on: macos-15
    steps:
      - name: Checkout core
        uses: actions/checkout@v4

      - name: Checkout iOS models
        uses: actions/checkout@v4
        with:
          repository: sleepypod/ios
          token: ${{ secrets.IOS_REPO_TOKEN }}
          path: ios-checkout
          sparse-checkout: Sleepypod/Models
          sparse-checkout-cone-mode: false

      - name: Copy iOS model files
        run: |
          mkdir -p contract-tests/Sources/SleepypodModels
          for f in Side DeviceStatus VitalsRecord SleepRecord MovementRecord ServerStatus Settings Schedule Services TemperatureConversion; do
            cp "ios-checkout/Sleepypod/Models/${f}.swift" contract-tests/Sources/SleepypodModels/
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start server
        run: |
          pnpm start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/healthcheck > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 60s"
          exit 1

      - name: Seed test data
        run: bash contract-tests/scripts/seed-test-data.sh

      - name: Snapshot API responses
        run: bash contract-tests/scripts/snapshot-responses.sh

      - name: Run Swift contract tests
        run: cd contract-tests && swift test

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
